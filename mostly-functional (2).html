// ── Plan definitions ────────────────────────────────────────────────────────

const WEEK_CONFIG = [
  { week: 1, repMod: 0,  weightMod: 0,    rpe: "RPE 7–8", label: "Foundation" },
  { week: 2, repMod: -2, weightMod: 1,    rpe: "RPE 8",   label: "Build" },
  { week: 3, repMod: -2, weightMod: 2,    rpe: "RPE 8–9", label: "Peak" },
  { week: 4, repMod: +4, weightMod: -0.1, rpe: "Deload",  label: "Deload", deload: true },
];

const PROG_INCREMENT = { big_lower: 10, compound: 5, upper: 5, machine: 5 };

// Swappable exercise alternatives — key is the default exercise name, value is array of options
const EXERCISE_SWAPS = {
  "Lat Pulldown": ["Lat Pulldown", "Assisted Pull Up"],
};

// Exercises where weight is entered as total but you load per side
// Exercises where you load/think in per-side weight (barbell each side, or dumbbell each hand)
const PER_SIDE_LOAD = new Set([
  "Back Squat", "Bench Press", "Rack Pull",
  "Sumo Deadlift", "Leg Press", "Single-leg Leg Press",
  "Incline Press", "Bulgarian Split Squat"
]);

// Exercises that can be done at bodyweight or bar weight
const HAS_BW_OPTION = new Set([
  "Back Squat", "Bench Press", "Rack Pull", "RDL",
  "Sumo Deadlift", "Hip Thrust", "Incline Press",
  "Bulgarian Split Squat", "Leg Press"
]);

function round5(n) { return Math.round(n / 5) * 5; }

// weekIncrements[i] = how many increments above week-0 baseline week i represents.
// Week pattern (per 4-week cycle): 0 inc, +1, +2, deload(~+1.8 effectively just 0.9×peak)
// We compute weight purely as: base + (stepsAhead × inc), where stepsAhead counts
// how many non-deload progression steps have happened since startWeek.
function stepsFromWeek(weekIndex) {
  // Returns the number of forward increment steps this week represents vs week 0
  const cycle = Math.floor(weekIndex / 4);
  const cycleWeek = weekIndex % 4;
  // Each full cycle = 2 steps (week1=+1, week2=+2, week3=deload at peak, week4=restart)
  // Within a cycle: w0=0 steps, w1=1 step, w2=2 steps, w3=2 steps (deload of peak)
  const withinCycleSteps = [0, 1, 2, 2][cycleWeek];
  return cycle * 2 + withinCycleSteps;
}

function calcWeekWeight(baseWeight, weekIndex, progType, startWeek = 0) {
  const inc = PROG_INCREMENT[progType];
  const stepsNow   = stepsFromWeek(weekIndex);
  const stepsStart = stepsFromWeek(startWeek);
  const stepsAhead = Math.max(0, stepsNow - stepsStart);
  const rawWeight  = baseWeight + stepsAhead * inc;
  // Apply deload if this is a deload week (cycleWeek === 3)
  if (weekIndex % 4 === 3) return round5(rawWeight * 0.9);
  return rawWeight;
}

function getISOWeek(dateStr) {
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const week1 = new Date(d.getFullYear(), 0, 4);
  return 1 + Math.round(((d.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}
function getISOYear(dateStr) {
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  return d.getFullYear();
}

function getWarmupSets(workWeight, minReps) {
  // workWeight here is per-side for PER_SIDE_LOAD exercises
  // warmup percentages are of that per-side weight
  return [
    { pct: 0.50, reps: minReps,     weight: round5(workWeight * 0.50) },
    { pct: 0.75, reps: Math.max(1, minReps - 2), weight: round5(workWeight * 0.75) },
    { pct: 0.90, reps: Math.max(1, minReps - 4), weight: round5(workWeight * 0.90) },
  ];
}

function getRepsForWeek(baseReps, weekIndex) {
  const cycleWeek = weekIndex % 4;
  const [lo, hi] = baseReps;
  const cfg = WEEK_CONFIG[cycleWeek];
  const mod = cfg.repMod;
  if (cfg.deload) return [lo + 4, hi + 4];
  return [Math.max(1, lo + mod), Math.max(1, hi + mod)];
}

// ── Storage helpers ─────────────────────────────────────────────────────────
const STORAGE_KEY = "gym_tracker_v3";


function migrateUser(u) {
  if (!u) return null;
  if (!u.workoutLog) u.workoutLog = [];
  if (u.streak === undefined) u.streak = 0;
  if (!u.lastWorkoutDate) u.lastWorkoutDate = null;
  if (!u.baseWeights) u.baseWeights = {};
  if (!u.currentPlan) u.currentPlan = "A";
  if (u.currentWeek === undefined) u.currentWeek = 0;
  if (u.weightsSetWeek === undefined) u.weightsSetWeek = u.currentWeek;
  if (!u.exerciseSwaps) u.exerciseSwaps = {};
  return u;
}

function migrateState(raw) {
  if (!raw) return null;
  // Handle old multi-user shape: { users: { me: {...}, sister: {...} }, activeUser, tab }
  if (raw.users && raw.users.me) {
    const u = migrateUser({ ...raw.users.me });
    return { user: u, tab: "workout" };
  }
  // Handle new single-user shape: { user: {...}, tab }
  if (raw.user) {
    raw.user = migrateUser(raw.user);
    return raw;
  }
  return null; // corrupt
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return migrateState(parsed);
  } catch { return null; }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}



// ── Default state ────────────────────────────────────────────────────────────
function defaultUser(name) {
  const baseWeights = {};
  ["A","B"].forEach(planKey => {
    PLANS[planKey].days.forEach(day => {
      day.exercises.forEach(ex => {
        baseWeights[`${planKey}_${ex.name}`] = "";
        if (ex.superset) baseWeights[`${planKey}_${ex.superset}`] = "";
      });
    });
  });
  return {
    name,
    currentPlan: "A",
    currentWeek: 0,
    baseWeights,
    workoutLog: [],
    streak: 0,
    lastWorkoutDate: null,
    exerciseSwaps: {}, // { "swapKey": "Alternative Exercise Name" }
  };
}

const INITIAL_STATE = {
  user: defaultUser("Kirstyn"),
  tab: "workout", // workout | setup
};

// ── Icons ────────────────────────────────────────────────────────────────────
const Icon = {
  Info: () => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:15,height:15}}>
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
    </svg>
  ),
  Fire: () => <span style={{fontSize:14}}>🔥</span>,
  Check: () => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{width:15,height:15}}>
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  ),
  Dumbbell: () => <span style={{fontSize:16}}>🌿</span>,
  Bolt: () => <span style={{fontSize:16}}>✨</span>,
  People: () => <span style={{fontSize:16}}>🌸</span>,

// ── Main App ─────────────────────────────────────────────────────────────────
function GymTracker({ onGymNav }) {
  const [state, setState] = useState(() => loadState() || INITIAL_STATE);
  const [tooltip, setTooltip] = useState(null); // exercise name
  const [fuckItMode, setFuckItMode] = useState(false);
  const [selectedDay, setSelectedDay] = useState(null);
  const [logEntries, setLogEntries] = useState({}); // {exName: {set1:{weight,reps}, ...}}
  const [completedSets, setCompletedSets] = useState({}); // {exName_setIdx: true}
  const [skippedSets, setSkippedSets] = useState({}); // {exName_setIdx: true}
  const [workoutDone, setWorkoutDone] = useState(false);
  const [weightOverrides, setWeightOverrides] = useState({});
  const [repsDone, setRepsDoneState] = useState({}); // { "ExName_setIdx": repCount }

  const user = state.user;

  const plan = PLANS[user.currentPlan];
  const weekIndex = user.currentWeek; // 0–7
  const cycleWeek = weekIndex % 4;
  const weekCfg = WEEK_CONFIG[cycleWeek];

  useEffect(() => { saveState(state); }, [state]);

  function updateUser(patch) {
    setState(s => ({ ...s, user: { ...s.user, ...patch } }));
  }

  function setTab(tab) { setState(s => ({ ...s, tab })); }

  // ── weight calculation ───────────────────────────────────────────────────
  // Progression ignores Fuck It days — we look back at the last real session
  // for this specific day to determine the correct week offset for weight calc.
  function getEffectiveWeekIndex(dayId) {
    if (!dayId) return weekIndex;
    // Check if there's already a real session for this day in the current week
    const realThisWeek = (user.workoutLog || []).some(
      l => l.dayId === dayId && !l.fuckIt && l.weekIndex === weekIndex
    );
    if (realThisWeek) return weekIndex;
    // Otherwise find the last real session for this day
    const realLogs = (user.workoutLog || []).filter(l => l.dayId === dayId && !l.fuckIt);
    if (realLogs.length === 0) return weekIndex;
    const lastRealWeek = realLogs[realLogs.length - 1].weekIndex;
    // Use current week if it's ahead, otherwise resume from last real week
    return Math.max(lastRealWeek, weekIndex);
  }

  function getWorkingWeight(exName, progType, planKey, dayId) {
    const bwKey = `${planKey}_${exName}`;
    const base = parseFloat(user.baseWeights[bwKey]);
    if (!base) return null;
    const override = weightOverrides[exName];
    if (override !== undefined) return parseFloat(override) || null;
    const effectiveWeek = getEffectiveWeekIndex(dayId);
    // startWeek = the program week when base weights were entered
    const startWeek = user.weightsSetWeek !== undefined ? user.weightsSetWeek : effectiveWeek;

    // Check if this exercise was held in the PREVIOUS session for this day
    const realLogs = (user.workoutLog || []).filter(l => l.dayId === dayId && !l.fuckIt);
    if (realLogs.length > 0) {
      const lastLog = realLogs[realLogs.length - 1];
      if (lastLog.heldExercises && lastLog.heldExercises[exName]) {
        return calcWeekWeight(base, lastLog.weekIndex, progType, startWeek);
      }
    }

    return calcWeekWeight(base, effectiveWeek, progType, startWeek);
  }

  function getFuckItWeight(exName, progType, planKey, dayId) {
    const w = getWorkingWeight(exName, progType, planKey, dayId);
    return w ? round5(w * 0.70) : null;
  }

  // Returns the weight from the last REAL logged session for this day/exercise
  // Only shows a real comparison — no hypothetical "last week" if never logged
  function getPrevWeight(exName, progType, planKey, dayId) {
    const bwKey = `${planKey}_${exName}`;
    const base = parseFloat(user.baseWeights[bwKey]);
    if (!base) return null;
    const startWeek = user.weightsSetWeek !== undefined ? user.weightsSetWeek : user.currentWeek;
    const realLogs = (user.workoutLog || []).filter(l => l.dayId === dayId && !l.fuckIt);
    if (realLogs.length === 0) return null; // no history → no comparison
    const lastLog = realLogs[realLogs.length - 1];
    return calcWeekWeight(base, lastLog.weekIndex, progType, startWeek);
  }

  // ── complete workout ─────────────────────────────────────────────────────
  function finishWorkout() {
    const today = new Date().toISOString().slice(0, 10);
    const day = plan.days.find(d => d.id === selectedDay);

    // For each exercise, check if 2 of 3 sets hit the top rep — if not, mark as held
    const heldExercises = {}; // { exName: true } — these won't progress next week
    if (!fuckItMode && day) {
      day.exercises.forEach(ex => {
        const swapKey = `${user.currentPlan}_${selectedDay}_${ex.name}`;
        const activeName = (user.exerciseSwaps || {})[swapKey] || ex.name;
        const topRep = getRepsForWeek([ex.reps[0], ex.reps[1]], weekIndex)[1];
        const anySkipped = [0,1,2].some(si => skippedSets[`${ex.name}_${si}`]);
        if (anySkipped) { heldExercises[activeName] = true; }
        else {
          const setsHit = [0,1,2].filter(si => (repsDone[`${ex.name}_${si}`] || 0) >= topRep).length;
          if (setsHit < 2) heldExercises[activeName] = true;
        }
        if (ex.superset) {
          const ssAnySkipped = [0,1,2].some(si => skippedSets[`${ex.superset}_${si}`]);
          if (ssAnySkipped) { heldExercises[ex.superset] = true; }
          else {
            const ssHit = [0,1,2].filter(si => (repsDone[`${ex.superset}_${si}`] || 0) >= topRep).length;
            if (ssHit < 2) heldExercises[ex.superset] = true;
          }
        }
      });
    }

    const entry = {
      date: today,
      plan: user.currentPlan,
      dayId: selectedDay,
      weekIndex,
      fuckIt: fuckItMode,
      entries: logEntries,
      repsDone: { ...repsDone },
      heldExercises,
    };

    // Fuck It days COUNT toward completing the week (fill a slot),
    // but are flagged so progression skips them.
    // Week advances once 3 distinct day slots are filled (real OR fuck it).
    let newWeekIndex = weekIndex;
    const thisWeekLogs = [...(user.workoutLog || []), entry].filter(l => l.weekIndex === weekIndex);
    const daysLogged = new Set(thisWeekLogs.map(l => l.dayId)).size;
    if (daysLogged >= 3) {
      newWeekIndex = (weekIndex + 1) % 8;
    }

    // Weekly streak — count consecutive weeks with at least one workout
    const todayWeek = getISOWeek(today);
    const todayYear = getISOYear(today);
    const lastDate = user.lastWorkoutDate;
    let newStreak = user.streak;
    if (!lastDate) {
      newStreak = 1;
    } else {
      const lastWeek = getISOWeek(lastDate);
      const lastYear = getISOYear(lastDate);
      const sameWeek = (lastWeek === todayWeek && lastYear === todayYear);
      const prevWeek = (todayWeek === 1)
        ? (lastWeek === 52 || lastWeek === 53) && lastYear === todayYear - 1
        : lastWeek === todayWeek - 1 && lastYear === todayYear;
      if (sameWeek) newStreak = user.streak; // already counted this week
      else if (prevWeek) newStreak = user.streak + 1; // consecutive week
      else newStreak = 1; // broke the streak
    }

    const updatedUser = {
      ...user,
      workoutLog: [...(user.workoutLog || []), entry],
      currentWeek: newWeekIndex,
      streak: newStreak,
      lastWorkoutDate: today,
    };
    updateUser(updatedUser);


    setWorkoutDone(true);
  }

  // ── toggle set complete ──────────────────────────────────────────────────
  function toggleSet(key) {
    setCompletedSets(s => {
      const next = { ...s, [key]: !s[key] };
      // if unchecking, clear the rep count too
      if (!next[key]) setRepsDoneState(r => { const n = {...r}; delete n[key]; return n; });
      return next;
    });
  }

  function setReps(key, val) {
    setRepsDoneState(r => ({ ...r, [key]: val }));
  }

  function skipSet(key) {
    // Mark as skipped (counts as "done" for finish purposes, flagged for progression)
    setSkippedSets(s => ({ ...s, [key]: !s[key] }));
    // Clear any rep count and uncheck if re-skipping
    if (!skippedSets[key]) {
      setCompletedSets(s => ({ ...s, [key]: false }));
      setRepsDoneState(r => { const n = {...r}; delete n[key]; return n; });
    }
  }

  const allSetsComplete = selectedDay && (() => {
    const day = plan.days.find(d => d.id === selectedDay);
    if (!day) return false;
    for (const ex of day.exercises) {
      for (let i = 0; i < 3; i++) {
        const key = `${ex.name}_${i}`;
        const skipped = skippedSets[key];
        if (!completedSets[key] && !skipped) return false;
        if (!fuckItMode && !skipped && !repsDone[key]) return false;
      }
      if (ex.superset) {
        for (let i = 0; i < 3; i++) {
          const key = `${ex.superset}_${i}`;
          const skipped = skippedSets[key];
          if (!completedSets[key] && !skipped) return false;
          if (!fuckItMode && !skipped && !repsDone[key]) return false;
        }
      }
    }
    return true;
  })();

  // ── RENDER ───────────────────────────────────────────────────────────────
  return (
    <div style={styles.root}>
      {/* Grain overlay */}
      <div style={styles.grain} />

      {/* Header */}
      <header style={styles.header}>
        <div style={styles.headerLeft}>
          <span style={styles.logo}><span style={styles.logoAccent}>🌿</span> liftsis</span>
          <span style={styles.streakBadge} title="Increments each new week you finish at least one workout">
            🔥 {user.streak} {user.streak === 1 ? "week" : "weeks"}
          </span>
        </div>

      </header>

      {/* Week banner */}
      <div style={styles.weekBanner}>
        <div style={styles.weekInfo}>
          <span style={styles.weekLabel}>
            
            {user.currentPlan} · week {(cycleWeek + 1)} of 4
          </span>
          <span style={styles.weekSub}>{weekCfg.label} — {weekCfg.rpe}</span>
        </div>
        <div style={styles.weekDots}>
          {Array.from({length: 8}).map((_, i) => (
            <div key={i} style={{...styles.weekDot, ...(i === weekIndex ? styles.weekDotActive : {}), ...(i < weekIndex ? styles.weekDotDone : {})}} />
          ))}
        </div>
      </div>

      {/* Nav tabs */}
      <nav style={styles.nav}>
        {[
          { key: "workout", icon: <Icon.Dumbbell />, label: "Today" },
          { key: "stats",   icon: <Icon.Chart />,    label: "Stats" },
          { key: "setup",   icon: <Icon.Settings />, label: "Setup" },
        ].map(t => (
          <button key={t.key} onClick={() => setTab(t.key)}
            style={{...styles.navBtn, ...(state.tab === t.key ? styles.navBtnActive : {})}}>
            {t.icon} {t.label}
          </button>
        ))}
      </nav>

      {/* ── TAB: WORKOUT ── */}
      {state.tab === "workout" && (
        <div style={styles.content}>
          {workoutDone ? (
            <div style={styles.doneBanner}>
              
              <div style={styles.doneTitle}>you showed up! 🌿</div>
              <div style={styles.doneSub}>That's all it takes. See you next time.</div>
              <button style={styles.primaryBtn} onClick={() => { setWorkoutDone(false); setSelectedDay(null); setCompletedSets({}); setSkippedSets({}); setLogEntries({}); setWeightOverrides({}); setRepsDoneState({}); setFuckItMode(false); }}>
                Back
              </button>
            </div>
          ) : !selectedDay ? (
            <>
              <div style={styles.sectionTitle}>what's today?</div>
              <div style={styles.dayGrid}>
                {plan.days.map(day => {
                  const doneThisWeek = (user.workoutLog || []).some(
                    l => l.dayId === day.id && l.weekIndex === weekIndex && !l.fuckIt
                  );
                  return (
                    <button key={day.id}
                      style={{...styles.dayCard, ...(doneThisWeek ? styles.dayCardDone : {})}}
                      onClick={() => { if (!doneThisWeek) { setSelectedDay(day.id); setFuckItMode(false); } }}>
                      <span style={styles.dayCardLabel}>{day.label}{doneThisWeek ? " ✓" : ""}</span>
                      <span style={styles.dayCardSub}>{doneThisWeek ? "done this week" : day.exercises.map(e => e.name).join(" · ")}</span>
                    </button>
                  );
                })}
                <div style={{marginTop:4}}>
                  <div style={styles.fuckItDivider}>⚡ Fuck It Day — pick which day you're subbing</div>
                  {plan.days.map(day => {
                    const fiDone = (user.workoutLog || []).some(l => l.dayId === day.id && l.weekIndex === weekIndex);
                    return (
                    <button key={"fi_"+day.id} style={{...styles.dayCard, ...styles.fuckItCard, marginBottom:6, ...(fiDone ? {opacity:0.4, cursor:"default"} : {})}} onClick={() => {
                      if (fiDone) return;
                      setSelectedDay(day.id);
                      setFuckItMode(true);
                    }}>
                      <Icon.Bolt />
                      <div>
                        <span style={styles.dayCardLabel}>{day.label}{fiDone ? " ✓" : ""}</span>
                        <span style={{...styles.dayCardSub, display:"block"}}>{fiDone ? "done this week" : "70% deload · no warmup · counts for the week"}</span>
                      </div>
                    </button>
                    );
                  })}
                </div>
              </div>
            </>
          ) : (
            <WorkoutView
              day={plan.days.find(d => d.id === selectedDay)}
              dayId={selectedDay}
              planKey={user.currentPlan}
              weekIndex={weekIndex}
              fuckIt={fuckItMode}
              getWorkingWeight={getWorkingWeight}
              getFuckItWeight={getFuckItWeight}
              getPrevWeight={getPrevWeight}
              weekCfg={weekCfg}
              completedSets={completedSets}
              toggleSet={toggleSet}
              allSetsComplete={allSetsComplete}
              finishWorkout={finishWorkout}
              onBack={() => { setSelectedDay(null); setFuckItMode(false); }}
              tooltip={tooltip}
              setTooltip={setTooltip}
              weightOverrides={weightOverrides}
              setWeightOverrides={setWeightOverrides}
              repsDone={repsDone}
              setReps={setReps}
              skippedSets={skippedSets}
              skipSet={skipSet}
              exerciseSwaps={user.exerciseSwaps || {}}
              onSwapExercise={(swapKey, choice) => updateUser({ exerciseSwaps: { ...(user.exerciseSwaps || {}), [swapKey]: choice } })}
            />
          )}
        </div>
      )}

      {/* ── TAB: SETUP ── */}
      {state.tab === "setup" && (
        <SetupView user={user} updateUser={updateUser} />
      )}

      {state.tab === "stats" && (
        <StatsView user={user} />
      )}

    </div>
  );
}

// ── helper: weight display ────────────────────────────────────────────────
// weight = auto-calculated per-side (or total for non-perside exercises)
// prevWeight = last week's weight for same exercise, to show the increase
function WeightDisplay({ weight, prevWeight, exName, override, onOverride, onReset, bwMode, onBwMode }) {
  const isPerSide = PER_SIDE_LOAD.has(exName);
  const hasBw = HAS_BW_OPTION.has(exName);
  const [showOverride, setShowOverride] = useState(false);

  const activeWeight = override !== undefined ? parseFloat(override) || 0 : weight || 0;
  const totalWeight  = isPerSide ? activeWeight * 2 : activeWeight;
  const inputDisabled = bwMode === "bw" || bwMode === "bar";

  // Weight increase label
  const increase = (prevWeight && weight && !override)
    ? weight - prevWeight : null;
  const increaseLabel = increase > 0 ? `+${increase} lbs from last week`
                      : increase < 0 ? `${increase} lbs from last week`
                      : increase === 0 ? "same as last week" : null;

  return (
    <div style={styles.weightBlock}>
      {/* bw/bar toggle */}
      {hasBw && (
        <div style={styles.modeToggle}>
          <button style={{...styles.modeBtn, ...((!bwMode) ? styles.modeBtnActive : {})}}
            onClick={() => onBwMode(null)}>weight</button>
          <button style={{...styles.modeBtn, ...(bwMode==="bar" ? styles.modeBtnActive : {})}}
            onClick={() => onBwMode(bwMode === "bar" ? null : "bar")}>bar only</button>
          <button style={{...styles.modeBtn, ...(bwMode==="bw"  ? styles.modeBtnActive : {})}}
            onClick={() => onBwMode(bwMode === "bw"  ? null : "bw")}>bodyweight</button>
        </div>
      )}

      {/* Main weight display */}
      {!inputDisabled && (
        <div style={styles.weightPrimary}>
          {activeWeight > 0 ? (
            <>
              <span style={styles.weightBig}>
                {isPerSide ? activeWeight : activeWeight}
                <span style={styles.weightUnit}> lbs {isPerSide ? "each side" : "total"}</span>
              </span>
              {isPerSide && <span style={styles.weightSub}>{totalWeight} lbs total</span>}
              {increaseLabel && <span style={styles.weightIncrease}>{increaseLabel}</span>}
            </>
          ) : (
            <span style={styles.weightEmpty}>enter starting weight in Setup</span>
          )}
          <button style={styles.overrideToggle} onClick={() => setShowOverride(s => !s)}>
            {showOverride ? "cancel" : override !== undefined ? "✏ overridden" : "override"}
          </button>
        </div>
      )}
      {bwMode === "bw"  && <div style={styles.weightBigAlt}>bodyweight</div>}
      {bwMode === "bar" && <div style={styles.weightBigAlt}>bar only · 45 lbs</div>}

      {/* Override input — hidden by default */}
      {!inputDisabled && showOverride && (
        <div style={styles.weightRow}>
          <input
            type="number"
            style={styles.weightInput}
            value={override !== undefined ? override : ""}
            onChange={e => onOverride(e.target.value)}
            placeholder={`override (lbs ${isPerSide ? "each side" : "total"})`}
            autoFocus
          />
          {override !== undefined && (
            <button style={styles.resetBtn} onClick={() => { onReset(); setShowOverride(false); }}>reset</button>
          )}
        </div>
      )}
    </div>
  );
}

// ── WorkoutView ──────────────────────────────────────────────────────────────
function WorkoutView({ day, dayId, planKey, weekIndex, fuckIt, getWorkingWeight, getFuckItWeight, getPrevWeight, weekCfg, completedSets, toggleSet, allSetsComplete, finishWorkout, onBack, tooltip, setTooltip, weightOverrides, setWeightOverrides, setReps, repsDone, skippedSets, skipSet, exerciseSwaps, onSwapExercise }) {
  const cycleWeek = weekIndex % 4;
  const [bwModes, setBwModes] = useState({});

  // Resolve the active name for a swappable exercise
  function resolveExName(ex) {
    if (!EXERCISE_SWAPS[ex.name]) return ex.name;
    const swapKey = `${planKey}_${dayId}_${ex.name}`;
    return exerciseSwaps[swapKey] || ex.name;
  }

  return (
    <div>
      <div style={styles.workoutHeader}>
        <button style={styles.backBtn} onClick={onBack}>← Back</button>
        <div>
          <div style={styles.workoutTitle}>{fuckIt ? "⚡ Fuck It Day" : day.label}</div>
          {fuckIt && <div style={styles.fuckItNote}>70% deload · no warmups · won't break progression</div>}
          {!fuckIt && <div style={styles.rpeTag}>{weekCfg.rpe} · {weekCfg.label}</div>}
        </div>
      </div>

      {day.exercises.map((ex, ei) => {
        const activeName = resolveExName(ex);
        const swapKey = `${planKey}_${dayId}_${ex.name}`;
        const swapOptions = EXERCISE_SWAPS[ex.name];
        const workWeight = fuckIt ? getFuckItWeight(activeName, ex.prog, planKey, dayId) : getWorkingWeight(activeName, ex.prog, planKey, dayId);
        const prevWeight = getPrevWeight ? getPrevWeight(activeName, ex.prog, planKey, dayId) : null;
        const reps = getRepsForWeek([ex.reps[0], ex.reps[1]], weekIndex);
        const warmups = (!fuckIt && workWeight) ? getWarmupSets(workWeight, ex.reps[0]) : [];
        const override = weightOverrides[activeName];

        return (
          <div key={ex.name} style={styles.exCard}>
            {ex.superset && <div style={styles.supersetTag}>SUPERSET</div>}
            <div style={styles.exHeader}>
              <div style={{ display: "flex", flexDirection: "column", gap: 4, flex: 1, minWidth: 0 }}>
                {swapOptions ? (
                  <select
                    value={activeName}
                    onChange={e => onSwapExercise(swapKey, e.target.value)}
                    style={{ fontFamily: "Georgia, serif", fontStyle: "italic", fontWeight: 700, fontSize: 15, color: C.greenDark, background: "transparent", border: "none", borderBottom: `1.5px dashed ${C.petalDark}`, padding: "0 2px 2px 0", cursor: "pointer", appearance: "auto", width: "100%", outline: "none" }}
                  >
                    {swapOptions.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                  </select>
                ) : (
                  <span style={styles.exName}>
                    {activeName}
                    {ex.perSide && <span style={styles.perSideTag}> · each side</span>}
                  </span>
                )}
                {swapOptions && ex.perSide && <span style={styles.perSideTag}>each side</span>}
              </div>
              <button
                style={styles.infoBtn}
                onClick={() => setTooltip(tooltip === activeName ? null : activeName)}
                title="How to do this exercise"
              >
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:15,height:15}}>
                  <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
                </svg>
              </button>
            </div>

            {tooltip === activeName && (
              <div style={styles.tooltipBox}>
                {EXERCISE_TIPS[activeName] && (
                  <span style={styles.ytLink}>💡 {EXERCISE_TIPS[activeName]}</span>
                )}
              </div>
            )}

            <WeightDisplay
              weight={workWeight}
              prevWeight={prevWeight}
              exName={activeName}
              override={weightOverrides[activeName]}
              onOverride={val => setWeightOverrides(w => ({...w, [activeName]: val}))}
              onReset={() => setWeightOverrides(w => { const n={...w}; delete n[activeName]; return n; })}
              bwMode={bwModes[activeName] || null}
              onBwMode={mode => setBwModes(m => ({...m, [activeName]: mode}))}
            />

            {/* Warmup sets */}
            {warmups.length > 0 && (
              <div style={styles.warmupSection}>
                <div style={styles.warmupTitle}>Warm-up sets</div>
                {warmups.map((wu, wi) => {
                  const isPS = PER_SIDE_LOAD.has(activeName);
                  // wu.weight is total (calculated from base which is per-side * 2)
                  const psSide = isPS ? (wu.weight / 2).toFixed(1).replace(/\.0$/, "") : null;
                  return (
                    <div key={wi} style={styles.warmupRow}>
                      <span style={styles.warmupPct}>{Math.round(wu.pct*100)}%</span>
                      <div style={{flex:1}}>
                        {isPS
                          ? <><span style={styles.warmupWeight}>{psSide} lbs each side</span><span style={styles.warmupPlateLabel}> ({wu.weight} total)</span></>
                          : <span style={styles.warmupWeight}>{wu.weight} lbs</span>
                        }
                      </div>
                      <span style={styles.warmupReps}>× {wu.reps} reps</span>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Working sets */}
            <div style={styles.setsSection}>
              <div style={styles.setsTitle}>Working sets — {reps[0]}–{reps[1]} reps</div>
              <div style={styles.setsCol}>
                {[0,1,2].map(si => {
                  const key = `${ex.name}_${si}`;
                  const done = completedSets[key];
                  const skipped = skippedSets[key];
                  const repVal = repsDone[key];
                  const topRep = reps[1];
                  const hitTop = repVal >= topRep;
                  return (
                    <div key={si} style={styles.setRow}>
                      <button
                        style={{...styles.setBtn, ...(skipped ? styles.setBtnSkipped : done ? (hitTop ? styles.setBtnDone : styles.setBtnDonePartial) : {})}}
                        onClick={() => skipped ? skipSet(key) : toggleSet(key)}
                      >
                        {skipped ? "skipped" : done
                          ? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{width:13,height:13}}><polyline points="20 6 9 17 4 12"/></svg>
                          : `Set ${si+1}`
                        }
                      </button>
                      {done && !skipped && (
                        <div style={styles.repInputWrap}>
                          <input
                            type="number"
                            min="0"
                            max="99"
                            style={{...styles.repInput, ...(hitTop ? styles.repInputHit : {})}}
                            value={repVal || ""}
                            onChange={e => setReps(key, parseInt(e.target.value) || 0)}
                            placeholder="reps"
                            autoFocus={!repVal}
                          />
                          <span style={styles.repLabel}>
                            {repVal ? (hitTop ? "✓" : `goal: ${topRep}`) : "reps?"}
                          </span>
                          <button style={styles.skipInlineBtn} onClick={() => skipSet(key)}>skip</button>
                        </div>
                      )}
                      {!done && !skipped && (
                        <button style={styles.skipInlineBtn} onClick={() => skipSet(key)}>skip</button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Superset partner */}
            {ex.superset && (
              <div style={{...styles.exCard, marginTop: 10, background: "rgba(255,200,100,0.05)", border: "1px solid rgba(255,200,100,0.15)"}}>
                <div style={styles.exHeader}>
                  <span style={styles.exName}>{ex.superset}</span>
                  <button style={styles.infoBtn} onClick={() => setTooltip(tooltip === ex.superset ? null : ex.superset)}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:15,height:15}}>
                      <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                  </button>
                </div>
                {tooltip === ex.superset && (
                  <div style={styles.tooltipBox}>
                    {EXERCISE_TIPS[ex.superset] && (
                      <span style={styles.ytLink}>💡 {EXERCISE_TIPS[ex.superset]}</span>
                    )}
                  </div>
                )}
                <div style={styles.setsCol}>
                  {[0,1,2].map(si => {
                    const key = `${ex.superset}_${si}`;
                    const done = completedSets[key];
                    const skipped = skippedSets[key];
                    const repVal = repsDone[key];
                    const topRep = reps[1];
                    const hitTop = repVal >= topRep;
                    return (
                      <div key={si} style={styles.setRow}>
                        <button
                          style={{...styles.setBtn, ...(skipped ? styles.setBtnSkipped : done ? (hitTop ? styles.setBtnDone : styles.setBtnDonePartial) : {})}}
                          onClick={() => skipped ? skipSet(key) : toggleSet(key)}
                        >
                          {skipped ? "skipped" : done
                            ? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{width:13,height:13}}><polyline points="20 6 9 17 4 12"/></svg>
                            : `Set ${si+1}`
                          }
                        </button>
                        {done && !skipped && (
                          <div style={styles.repInputWrap}>
                            <input
                              type="number"
                              min="0"
                              max="99"
                              style={{...styles.repInput, ...(hitTop ? styles.repInputHit : {})}}
                              value={repVal || ""}
                              onChange={e => setReps(key, parseInt(e.target.value) || 0)}
                              placeholder="reps"
                            />
                            <span style={styles.repLabel}>
                              {repVal ? (hitTop ? "✓" : `goal: ${topRep}`) : "reps?"}
                            </span>
                            <button style={styles.skipInlineBtn} onClick={() => skipSet(key)}>skip</button>
                          </div>
                        )}
                        {!done && !skipped && (
                          <button style={styles.skipInlineBtn} onClick={() => skipSet(key)}>skip</button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        );
      })}

      {allSetsComplete ? (
        <button style={styles.finishBtn} onClick={finishWorkout}>
          ✓ Finish & Log Workout
        </button>
      ) : (
        <div style={styles.finishHint}>
          {(() => {
            const missing = [];
            day.exercises.forEach(ex => {
              for (let i = 0; i < 3; i++) {
                if (!completedSets[`${ex.name}_${i}`]) { missing.push("sets"); break; }
              }
              if (!fuckIt) {
                for (let i = 0; i < 3; i++) {
                  if (completedSets[`${ex.name}_${i}`] && !repsDone[`${ex.name}_${i}`]) { missing.push("reps"); break; }
                }
              }
            });
            const u = [...new Set(missing)];
            if (u.includes("sets") && u.includes("reps")) return "✓ check off all sets and enter reps to finish";
            if (u.includes("sets")) return "✓ check off all sets to finish";
            if (u.includes("reps")) return "✓ enter reps for all completed sets to finish";
            return "almost there...";
          })()}
        </div>
      )}
    </div>
  );
}

// ── SetupView ────────────────────────────────────────────────────────────────
function SetupView({ user, updateUser }) {
  const [localWeights, setLocalWeights] = useState({ ...user.baseWeights });
  const [localName, setLocalName] = useState(user.name);
  const [saved, setSaved] = useState(false);

  function save() {
    updateUser({
      baseWeights: localWeights,
      name: localName,
      weightsSetWeek: user.currentWeek,
    });
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }

  function handleWeekChange(delta) {
    const newWeek = Math.max(0, Math.min(7, user.currentWeek + delta));
    updateUser({ currentWeek: newWeek });
  }

  function handlePlanChange(plan) {
    updateUser({ currentPlan: plan, currentWeek: 0 });
  }

  return (
    <div style={styles.content}>
      <div style={styles.sectionTitle}>setup</div>

      <div style={styles.setupCard}>
        <label style={styles.setupLabel}>Display Name</label>
        <input style={styles.setupInput} value={localName} onChange={e => setLocalName(e.target.value)} />
      </div>

      <div style={styles.setupCard}>
        <label style={styles.setupLabel}>Current Plan</label>
        <div style={styles.planToggle}>
          {["A","B"].map(p => (
            <button key={p} style={{...styles.planBtn, ...(user.currentPlan === p ? styles.planBtnActive : {})}}
              onClick={() => handlePlanChange(p)}>
              Plan {p}
            </button>
          ))}
        </div>
      </div>

      <div style={styles.setupCard}>
        <label style={styles.setupLabel}>Program Week ({user.currentWeek + 1} of 8)</label>
        <div style={styles.weekAdjust}>
          <button style={styles.adjBtn} onClick={() => handleWeekChange(-1)}>−</button>
          <span style={styles.weekNum}>Week {user.currentWeek + 1}</span>
          <button style={styles.adjBtn} onClick={() => handleWeekChange(1)}>+</button>
        </div>
      </div>

      {["A","B"].map(planKey => (
        <div key={planKey}>
          <div style={styles.planHeader}>Plan {planKey} — Starting Weights (lbs)</div>
          {PLANS[planKey].days.map(day => (
            <div key={day.id} style={styles.setupCard}>
              <div style={styles.setupDayLabel}>{day.label}</div>
              {day.exercises.map(ex => {
                const val = parseFloat(localWeights[`${planKey}_${ex.name}`]);
                const isPS = PER_SIDE_LOAD.has(ex.name);
                const hasBw = HAS_BW_OPTION.has(ex.name);
                const totalVal = (isPS && val) ? (val * 2).toFixed(1).replace(/\.0$/, "") : null;
                return (
                  <div key={ex.name} style={styles.setupExBlock}>
                    <div style={styles.setupExRow}>
                      <span style={styles.setupExName}>{ex.name}</span>
                      <div style={{display:"flex", alignItems:"center", gap:6}}>
                        {hasBw && (
                          <select
                            style={styles.setupBwSelect}
                            value={localWeights[`${planKey}_${ex.name}_bw`] || "weight"}
                            onChange={e => setLocalWeights(w => ({...w, [`${planKey}_${ex.name}_bw`]: e.target.value}))}
                          >
                            <option value="weight">+ weight</option>
                            <option value="bar">bar only</option>
                            <option value="bw">bodyweight</option>
                          </select>
                        )}
                        {(!localWeights[`${planKey}_${ex.name}_bw`] || localWeights[`${planKey}_${ex.name}_bw`] === "weight") && (
                          <input
                            type="number"
                            style={styles.setupWeightInput}
                            placeholder={isPS ? "lbs/side" : "lbs"}
                            value={localWeights[`${planKey}_${ex.name}`] || ""}
                            onChange={e => setLocalWeights(w => ({...w, [`${planKey}_${ex.name}`]: e.target.value}))}
                          />
                        )}
                      </div>
                    </div>
                    {isPS && val > 0 && (!localWeights[`${planKey}_${ex.name}_bw`] || localWeights[`${planKey}_${ex.name}_bw`] === "weight") && (
                      <div style={styles.setupPlateRow}>
                        <span style={styles.setupPlateHint}>{totalVal} lbs total</span>
                      </div>
                    )}
                    {ex.superset && (
                      <div style={{marginTop: 8}}>
                        <div style={styles.setupExRow}>
                          <span style={styles.setupExName}>{ex.superset} <span style={{opacity:.5}}>(superset)</span></span>
                          <input
                            type="number"
                            style={styles.setupWeightInput}
                            placeholder="lbs/side"
                            value={localWeights[`${planKey}_${ex.superset}`] || ""}
                            onChange={e => setLocalWeights(w => ({...w, [`${planKey}_${ex.superset}`]: e.target.value}))}
                          />
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      ))}

      <button style={{...styles.primaryBtn, marginTop: 16}} onClick={save}>
        {saved ? "✓ Saved!" : "Save Changes"}
      </button>
    </div>
  );
}

// ── StatsView ────────────────────────────────────────────────────────────────
function StatsView({ user }) {
  const logs = (user.workoutLog || []).filter(l => !l.fuckIt);
  const allLogs = user.workoutLog || [];

  // ── Streak ───────────────────────────────────────────────────────────────
  const currentStreak = user.streak || 0;
  const longestStreak = (() => {
    // Walk through all logs grouped by ISO week, count max consecutive weeks
    const weeks = [...new Set(allLogs.map(l => `${getISOYear(l.date)}-${String(getISOWeek(l.date)).padStart(2,"0")}`))]
      .sort();
    if (!weeks.length) return 0;
    let max = 1, cur = 1;
    for (let i = 1; i < weeks.length; i++) {
      const [py, pw] = weeks[i-1].split("-").map(Number);
      const [cy, cw] = weeks[i].split("-").map(Number);
      const consecutive = (cy === py && cw === pw + 1) || (cy === py + 1 && pw >= 52 && cw === 1);
      if (consecutive) { cur++; max = Math.max(max, cur); }
      else cur = 1;
    }
    return Math.max(max, currentStreak);
  })();

  // ── Cycles ───────────────────────────────────────────────────────────────
  // Each completed 8-week cycle = 3 days logged per week × 8 weeks
  // Approximate from total weeks where ≥3 distinct days were logged
  const weekMap = {};
  allLogs.forEach(l => {
    const wk = `${getISOYear(l.date)}-${String(getISOWeek(l.date)).padStart(2,"0")}`;
    if (!weekMap[wk]) weekMap[wk] = new Set();
    weekMap[wk].add(l.dayId);
  });
  const completedWeeks = Object.values(weekMap).filter(s => s.size >= 3).length;
  const completedCycles = Math.floor(completedWeeks / 8);
  const weeksIntoCurrent = completedWeeks % 8;

  // ── Total volume & sessions ───────────────────────────────────────────────
  const totalSessions = allLogs.length;
  const fuckItCount = allLogs.filter(l => l.fuckIt).length;
  const firstDate = allLogs.length ? allLogs[0].date : null;

  // ── Days trained breakdown ────────────────────────────────────────────────
  const dayCount = {};
  allLogs.forEach(l => { dayCount[l.dayId] = (dayCount[l.dayId] || 0) + 1; });

  // ── Weight progression per exercise ──────────────────────────────────────
  // For each exercise, find first and most recent logged weight
  const weightHistory = {}; // exName -> [{date, weight}]
  logs.forEach(log => {
    if (!log.entries) return;
    Object.entries(log.entries).forEach(([exName, sets]) => {
      if (!weightHistory[exName]) weightHistory[exName] = [];
      const setWeights = Object.values(sets || {}).map(s => parseFloat(s.weight)).filter(w => !isNaN(w) && w > 0);
      if (setWeights.length) {
        const avg = Math.round(setWeights.reduce((a,b)=>a+b,0) / setWeights.length);
        weightHistory[exName].push({ date: log.date, weight: avg });
      }
    });
  });

  // Build progression summary: group by plan day label
  const exerciseGroups = {};
  ["A","B"].forEach(planKey => {
    PLANS[planKey].days.forEach(day => {
      day.exercises.forEach(ex => {
        const hist = weightHistory[ex.name];
        if (hist && hist.length >= 1) {
          const first = hist[0];
          const latest = hist[hist.length - 1];
          const gain = latest.weight - first.weight;
          if (!exerciseGroups[planKey]) exerciseGroups[planKey] = [];
          exerciseGroups[planKey].push({ name: ex.name, first: first.weight, latest: latest.weight, gain, sessions: hist.length });
        }
        if (ex.superset) {
          const hist2 = weightHistory[ex.superset];
          if (hist2 && hist2.length >= 1) {
            const first = hist2[0];
            const latest = hist2[hist2.length - 1];
            const gain = latest.weight - first.weight;
            if (!exerciseGroups[planKey]) exerciseGroups[planKey] = [];
            exerciseGroups[planKey].push({ name: ex.superset, first: first.weight, latest: latest.weight, gain, sessions: hist2.length });
          }
        }
      });
    });
  });

  // ── Personal bests (highest single logged weight per exercise) ────────────
  const prs = {};
  logs.forEach(log => {
    if (!log.entries) return;
    Object.entries(log.entries).forEach(([exName, sets]) => {
      const setWeights = Object.values(sets || {}).map(s => parseFloat(s.weight)).filter(w => !isNaN(w) && w > 0);
      if (setWeights.length) {
        const max = Math.max(...setWeights);
        if (!prs[exName] || max > prs[exName].weight) prs[exName] = { weight: max, date: log.date };
      }
    });
  });

  const hasPRs = Object.keys(prs).length > 0;
  const hasWeightData = Object.keys(exerciseGroups).length > 0;

  const StatCard = ({ children, style }) => (
    <div style={{ background: C.surface, border: `1.5px solid ${C.border}`, borderRadius: 16, padding: "14px 16px", ...style }}>
      {children}
    </div>
  );

  const SectionLabel = ({ children }) => (
    <div style={{ fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", color: C.textMid, marginBottom: 10, fontWeight: 700 }}>
      {children}
    </div>
  );

  const GainPill = ({ gain }) => {
    if (gain === 0) return <span style={{ fontSize: 11, color: C.textMid, fontStyle: "italic" }}>no change</span>;
    const pos = gain > 0;
    return (
      <span style={{ fontSize: 11, fontWeight: 700, color: pos ? C.accent : "#c0392b", background: pos ? C.petal : "#fdecea", padding: "2px 7px", borderRadius: 20 }}>
        {pos ? "+" : ""}{gain} lbs
      </span>
    );
  };

  // Simple inline bar chart
  const MiniBar = ({ value, max, color }) => (
    <div style={{ height: 6, borderRadius: 4, background: C.border, flex: 1, overflow: "hidden" }}>
      <div style={{ height: "100%", width: `${Math.min(100, (value/max)*100)}%`, background: color || C.accent, borderRadius: 4, transition: "width .4s" }} />
    </div>
  );

  return (
    <div style={styles.content}>
      <div style={styles.sectionTitle}>your progress</div>

      {totalSessions === 0 ? (
        <div style={{ textAlign: "center", color: C.textMid, fontStyle: "italic", padding: "40px 0", fontSize: 14 }}>
          finish your first workout to see stats here 🌱
        </div>
      ) : (<>

        {/* ── STREAK ── */}
        <SectionLabel>streak</SectionLabel>
        <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
          <StatCard style={{ flex: 1, textAlign: "center" }}>
            <div style={{ fontSize: 34, fontWeight: 700, color: C.accent, lineHeight: 1 }}>{currentStreak}</div>
            <div style={{ fontSize: 11, color: C.textMid, marginTop: 4 }}>current 🔥</div>
            <div style={{ fontSize: 10, color: C.textMid, fontStyle: "italic", marginTop: 2 }}>weeks in a row</div>
          </StatCard>
          <StatCard style={{ flex: 1, textAlign: "center" }}>
            <div style={{ fontSize: 34, fontWeight: 700, color: C.greenDark, lineHeight: 1 }}>{longestStreak}</div>
            <div style={{ fontSize: 11, color: C.textMid, marginTop: 4 }}>best ever 🏆</div>
            <div style={{ fontSize: 10, color: C.textMid, fontStyle: "italic", marginTop: 2 }}>weeks in a row</div>
          </StatCard>
        </div>

        {/* ── CYCLES ── */}
        <SectionLabel>program cycles</SectionLabel>
        <StatCard style={{ marginBottom: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div>
              <span style={{ fontSize: 28, fontWeight: 700, color: C.greenDark }}>{completedCycles}</span>
              <span style={{ fontSize: 13, color: C.textMid, marginLeft: 6 }}>full {completedCycles === 1 ? "cycle" : "cycles"} completed</span>
            </div>
            {completedCycles > 0 && (
              <span style={{ fontSize: 11, color: C.accent, fontWeight: 700, background: C.petal, padding: "3px 10px", borderRadius: 20 }}>
                Plan {completedCycles % 2 === 0 ? "A" : "B"} next
              </span>
            )}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
            <MiniBar value={weeksIntoCurrent} max={8} />
            <span style={{ fontSize: 11, color: C.textMid, whiteSpace: "nowrap" }}>{weeksIntoCurrent}/8 wks</span>
          </div>
          <div style={{ fontSize: 11, color: C.textMid, fontStyle: "italic" }}>into current cycle</div>
        </StatCard>

        {/* ── SESSIONS ── */}
        <SectionLabel>sessions</SectionLabel>
        <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
          <StatCard style={{ flex: 1, textAlign: "center" }}>
            <div style={{ fontSize: 28, fontWeight: 700, color: C.greenDark }}>{totalSessions}</div>
            <div style={{ fontSize: 11, color: C.textMid, marginTop: 4 }}>total sessions</div>
          </StatCard>
          <StatCard style={{ flex: 1, textAlign: "center" }}>
            <div style={{ fontSize: 28, fontWeight: 700, color: C.fuckIt || "#c17f3e" }}>{fuckItCount}</div>
            <div style={{ fontSize: 11, color: C.textMid, marginTop: 4 }}>⚡ fuck it days</div>
          </StatCard>
          {firstDate && (
            <StatCard style={{ flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: C.greenDark, lineHeight: 1.2 }}>
                {Math.floor((new Date() - new Date(firstDate)) / (1000*60*60*24))}
              </div>
              <div style={{ fontSize: 11, color: C.textMid, marginTop: 4 }}>days since<br/>day one</div>
            </StatCard>
          )}
        </div>

        {/* ── WEIGHT GAINS ── */}
        {hasWeightData && (<>
          <SectionLabel>weight progression</SectionLabel>
          {["A","B"].filter(pk => exerciseGroups[pk]?.length).map(pk => (
            <div key={pk} style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 11, color: C.accent, fontWeight: 700, marginBottom: 8, fontStyle: "italic" }}>
                Plan {pk} — {PLANS[pk].name}
              </div>
              <StatCard>
                {exerciseGroups[pk].sort((a,b) => b.gain - a.gain).map((ex, i) => (
                  <div key={ex.name} style={{ display: "flex", alignItems: "center", gap: 10, paddingBottom: i < exerciseGroups[pk].length-1 ? 10 : 0, marginBottom: i < exerciseGroups[pk].length-1 ? 10 : 0, borderBottom: i < exerciseGroups[pk].length-1 ? `1px solid ${C.border}` : "none" }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: C.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ex.name}</div>
                      <div style={{ fontSize: 10, color: C.textMid, marginTop: 1 }}>{ex.first} → {ex.latest} lbs · {ex.sessions} {ex.sessions === 1 ? "session" : "sessions"}</div>
                    </div>
                    <GainPill gain={ex.gain} />
                  </div>
                ))}
              </StatCard>
            </div>
          ))}
        </>)}

        {/* ── PERSONAL BESTS ── */}
        {hasPRs && (<>
          <SectionLabel style={{ marginTop: 4 }}>personal bests 🏅</SectionLabel>
          <StatCard style={{ marginBottom: 20 }}>
            {Object.entries(prs).sort((a,b) => b[1].weight - a[1].weight).map(([name, pr], i, arr) => (
              <div key={name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingBottom: i < arr.length-1 ? 9 : 0, marginBottom: i < arr.length-1 ? 9 : 0, borderBottom: i < arr.length-1 ? `1px solid ${C.border}` : "none" }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: C.text }}>{name}</div>
                  <div style={{ fontSize: 10, color: C.textMid }}>{pr.date}</div>
                </div>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.greenDark }}>{pr.weight} lbs</div>
              </div>
            ))}
          </StatCard>
        </>)}

        {/* ── FUN FACT ── */}
        {totalSessions >= 3 && (
          <StatCard style={{ background: C.petal, border: `1.5px solid ${C.petalDark}`, textAlign: "center", marginBottom: 8 }}>
            <div style={{ fontSize: 18, marginBottom: 4 }}>🌿</div>
            <div style={{ fontSize: 12, color: C.greenDark, fontStyle: "italic", lineHeight: 1.5 }}>
              {totalSessions >= 50 ? `${totalSessions} sessions strong. you're not just building a body — you're building a person.`
               : totalSessions >= 20 ? `${totalSessions} sessions in. the hardest part was starting. you already did that.`
               : totalSessions >= 10 ? `${totalSessions} sessions down. most people quit before this. you didn't.`
               : `${totalSessions} sessions in the books. every rep is a vote for the person you're becoming.`}
            </div>
          </StatCard>
        )}

      </>)}
    </div>
  );
}

const PLANNER_KEY = "mostly_functional_v1";

function buildPlannerDefault() {
  const s = {};
  for (let d = 0; d < 7; d++) {
    s[d] = {
      slots: SCHEDULE_DATA[d].map(sl => ({
        ...sl,
        checked: false,
        skipped: false,
        note: "",
        teeth_am: sl.teeth === "am" ? [false, false] : undefined,
        teeth_pm: sl.teeth === "pm" ? [false, false] : undefined,
      })),
      cleaning: CLEANING_DATA[d].tasks.map((t, i) => ({ id: `cl${d}_${i}`, text: t, checked: false })),
      unscheduled: UNSCHEDULED_DEFAULTS[d].map(u => ({ ...u, time: "", checked: false })),
      water: [false, false, false, false],
      affirmation: DEFAULT_AFFIRMATIONS[d],
    };
  }
  return s;
}

function loadPlannerState() {
  try {
    const raw = localStorage.getItem(PLANNER_KEY);
    if (!raw) return buildPlannerDefault();
    const parsed = JSON.parse(raw);
    for (let d = 0; d < 7; d++) {
      if (!parsed[d]) parsed[d] = buildPlannerDefault()[d];
      if (!parsed[d].water) parsed[d].water = [false,false,false,false];
      if (!parsed[d].unscheduled) parsed[d].unscheduled = UNSCHEDULED_DEFAULTS[d].map(u=>({...u,time:"",checked:false}));
    }
    // One-time cleanup: remove the Friday 4:00p gym slot
    if (parsed[5]?.slots) {
      parsed[5].slots = parsed[5].slots.filter(s => !(s.tag === "gym" && s.time === "4:00p"));
    }
    return parsed;
  } catch { return buildPlannerDefault(); }
}

function savePlannerState(s) {
  try { localStorage.setItem(PLANNER_KEY, JSON.stringify(s)); } catch {}
}
