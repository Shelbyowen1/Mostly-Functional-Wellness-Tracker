// ── PlannerView ──────────────────────────────────────────────────────────────
function PlannerView({ onGymNav }) {
  const TODAY = new Date().getDay();
  const [activeDay, setActiveDay] = useState(TODAY);
  const [plannerState, setPlannerState] = useState(() => loadPlannerState());
  const [newTask, setNewTask] = useState("");

  useEffect(() => { savePlannerState(plannerState); }, [plannerState]);

  function updateDay(d, patch) {
    setPlannerState(s => ({ ...s, [d]: { ...s[d], ...patch } }));
  }

  function toggleSlot(dayIdx, slotIdx) {
    const slots = plannerState[dayIdx].slots.map((s, i) =>
      i === slotIdx ? { ...s, checked: !s.checked } : s
    );
    updateDay(dayIdx, { slots });
  }

  function skipSlot(dayIdx, slotIdx) {
    const slots = plannerState[dayIdx].slots.map((s, i) => {
      if (i !== slotIdx) return s;
      const skipped = !s.skipped;
      return { ...s, skipped, checked: skipped ? false : s.checked };
    });
    updateDay(dayIdx, { slots });
  }

  function updateNote(dayIdx, slotIdx, note) {
    const slots = plannerState[dayIdx].slots.map((s, i) =>
      i === slotIdx ? { ...s, note } : s
    );
    updateDay(dayIdx, { slots });
  }

  function updateTime(dayIdx, slotIdx, time) {
    const slots = plannerState[dayIdx].slots.map((s, i) =>
      i === slotIdx ? { ...s, time } : s
    );
    updateDay(dayIdx, { slots });
  }

  function toggleTeeth(dayIdx, slotIdx, teethKey, biteIdx) {
    const slots = plannerState[dayIdx].slots.map((s, i) => {
      if (i !== slotIdx) return s;
      const arr = [...(s[teethKey] || [false, false])];
      arr[biteIdx] = !arr[biteIdx];
      return { ...s, [teethKey]: arr };
    });
    updateDay(dayIdx, { slots });
  }

  function toggleWater(dayIdx, bottleIdx) {
    const water = plannerState[dayIdx].water.map((w, i) => i === bottleIdx ? !w : w);
    updateDay(dayIdx, { water });
  }

  function toggleCleaning(dayIdx, taskIdx) {
    const cleaning = plannerState[dayIdx].cleaning.map((c, i) =>
      i === taskIdx ? { ...c, checked: !c.checked } : c
    );
    updateDay(dayIdx, { cleaning });
  }

  function addUnscheduled() {
    const t = newTask.trim();
    if (!t) return;
    const unscheduled = [...plannerState[activeDay].unscheduled, { id: "u" + Date.now(), text: t, time: "", checked: false }];
    updateDay(activeDay, { unscheduled });
    setNewTask("");
  }

  function scheduleItem(dayIdx, itemId, time) {
    if (!time) return;
    const item = plannerState[dayIdx].unscheduled.find(u => u.id === itemId);
    if (!item) return;
    const newSlot = { id: "inj" + Date.now(), time, label: item.text, tag: "", checked: false, skipped: false, note: "", added: true };
    const slots = [...plannerState[dayIdx].slots, newSlot].sort((a, b) => compareTimeStr(a.time, b.time));
    const unscheduled = plannerState[dayIdx].unscheduled.filter(u => u.id !== itemId);
    updateDay(dayIdx, { slots, unscheduled });
  }

  function resetDay(dayIdx) {
    const slots = plannerState[dayIdx].slots
      .filter(s => !s.added) // remove user-added slots
      .map(s => ({
        ...s, checked: false, skipped: false,
        teeth_am: s.teeth_am ? [false, false] : undefined,
        teeth_pm: s.teeth_pm ? [false, false] : undefined,
      }));
    const cleaning = plannerState[dayIdx].cleaning.map(c => ({ ...c, checked: false }));
    updateDay(dayIdx, { slots, cleaning, water: [false, false, false, false] });
  }

  function compareTimeStr(a, b) {
    const parse = t => {
      if (!t || t === "" || isNaN(parseInt(t))) return 9999;
      const ampm = t.slice(-1).toLowerCase();
      const [h, m] = t.slice(0, -1).split(":").map(Number);
      let h24 = h;
      if (ampm === "p" && h !== 12) h24 = h + 12;
      if (ampm === "a" && h === 12) h24 = 0;
      return h24 * 60 + (m || 0);
    };
    return parse(a) - parse(b);
  }

  const day = plannerState[activeDay];
  const checkedCount = day.slots.filter(s => s.checked).length;
  const totalCount = day.slots.length;
  const waterCount = day.water.filter(Boolean).length;

  // Dynamic — any day that has a gym-tagged slot shows the 💪 dot
  const gymDays = Array.from({length: 7}, (_, i) =>
    plannerState[i].slots.some(s => s.tag === "gym")
  );

  function addGymSlot(dayIdx, time, label) {
    const newSlot = {
      id: "gym" + Date.now(),
      time: time || "",
      label: label || "💪 Gym session",
      tag: "gym",
      checked: false,
      skipped: false,
      note: "",
      added: true,
    };
    const slots = [...plannerState[dayIdx].slots, newSlot].sort((a, b) => compareTimeStr(a.time, b.time));
    updateDay(dayIdx, { slots });
  }

  function removeSlot(dayIdx, slotId) {
    const slots = plannerState[dayIdx].slots.filter(s => s.id !== slotId);
    updateDay(dayIdx, { slots });
  }

  const displayDate = (() => {
    const d = new Date();
    d.setDate(d.getDate() + (activeDay - TODAY));
    return d.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
  })();

  return (
    <div style={{ background: PC.bg, minHeight: "100vh" }}>

      {/* Day tabs */}
      <div style={{ display: "flex", overflowX: "auto", background: PC.surface, borderBottom: `1px solid ${PC.border}`, padding: "0 8px", scrollbarWidth: "none" }}>
        {DAYS.map((name, i) => {
          const isToday = i === TODAY;
          const isActive = i === activeDay;
          const hasGym = gymDays[i];
          return (
            <button key={i} onClick={() => setActiveDay(i)} style={{
              flexShrink: 0, padding: "10px 14px 9px",
              fontSize: 11, fontFamily: "monospace", letterSpacing: "0.07em", textTransform: "uppercase",
              background: "transparent", border: "none", cursor: "pointer",
              borderBottom: isActive ? `2px solid ${PC.accent}` : "2px solid transparent",
              color: isActive ? PC.greenDark : isToday ? PC.accent : PC.textMid,
              fontWeight: isActive ? 700 : 400,
              position: "relative",
            }}>
              {SHORT[i]}
              {isToday && <span style={{ position: "absolute", top: 7, right: 5, width: 4, height: 4, borderRadius: "50%", background: PC.orange, display: "block" }} />}
              {hasGym && <span style={{ position: "absolute", bottom: 11, right: 4, fontSize: 7 }}>💪</span>}
            </button>
          );
        })}
      </div>

      {/* Header */}
      <div style={{ textAlign: "center", padding: "14px 12px 6px" }}>
        <div style={{ fontSize: 9, color: PC.textMid, letterSpacing: "0.14em", textTransform: "uppercase", fontFamily: "monospace", marginBottom: 3 }}>
          {DAYS[activeDay]} · {displayDate}
        </div>
        <div style={{ fontSize: 22, fontWeight: 700, fontStyle: "italic", color: PC.greenDark, fontFamily: "Georgia, serif" }}>
          Mostly Functional
        </div>
        <div style={{ fontSize: 11, color: PC.textMid, fontStyle: "italic", marginTop: 2 }}>
          {checkedCount} of {totalCount} items done
        </div>
      </div>

      {/* Affirmation */}
      <div style={{ maxWidth: 680, margin: "10px auto 4px", padding: "0 12px" }}>
        <div style={{ background: PC.surface, border: `1px solid ${PC.border}`, borderLeft: `3px solid ${PC.orange}`, borderRadius: 10, padding: "10px 14px", display: "flex", gap: 10 }}>
          <span style={{ fontSize: 16, flexShrink: 0, marginTop: 2 }}>🌸</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 9, color: PC.textMid, letterSpacing: "0.1em", textTransform: "uppercase", fontFamily: "monospace", marginBottom: 4 }}>Today's affirmation</div>
            <textarea
              rows={1}
              value={day.affirmation || ""}
              onChange={e => updateDay(activeDay, { affirmation: e.target.value })}
              placeholder="Your affirmation for today…"
              style={{
                width: "100%", background: "transparent", border: "none", outline: "none", resize: "none",
                fontFamily: "Georgia, serif", fontStyle: "italic", fontSize: 14, color: PC.text, lineHeight: 1.6,
              }}
            />
          </div>
        </div>
      </div>

      {/* Main grid */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr min(300px, 100%)", gap: 10, maxWidth: 1100, margin: "10px auto 40px", padding: "0 10px" }}>

        {/* Timeline */}
        <div>
          <div style={{ fontSize: 9, color: PC.textMid, letterSpacing: "0.1em", textTransform: "uppercase", fontFamily: "monospace", marginBottom: 6 }}>Your day</div>
          {day.slots.map((slot, si) => (
            <SlotRow
              key={slot.id}
              slot={slot}
              dayIdx={activeDay}
              slotIdx={si}
              onToggle={() => toggleSlot(activeDay, si)}
              onSkip={() => skipSlot(activeDay, si)}
              onDelete={() => removeSlot(activeDay, slot.id)}
              onNote={note => updateNote(activeDay, si, note)}
              onTime={time => updateTime(activeDay, si, time)}
              onTeeth={(key, bi) => toggleTeeth(activeDay, si, key, bi)}
              onGymNav={onGymNav}
            />
          ))}
        </div>

        {/* Sidebar */}
        <div>

          {/* Gym session */}
          <GymSessionCard
            activeDay={activeDay}
            daySlots={day.slots}
            onAdd={(time, label) => addGymSlot(activeDay, time, label)}
            onRemove={(slotId) => removeSlot(activeDay, slotId)}
            onGymNav={onGymNav}
          />

          {/* Unscheduled */}
          <SideCard title="Pick a time" dotColor={PC.blue}>
            {day.unscheduled.filter(u => !u.time).map(item => (
              <UnscheduledItem key={item.id} item={item} onSchedule={(time) => scheduleItem(activeDay, item.id, time)} />
            ))}
            <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
              <input
                value={newTask}
                onChange={e => setNewTask(e.target.value)}
                onKeyDown={e => e.key === "Enter" && addUnscheduled()}
                placeholder="+ add task…"
                style={{ flex: 1, background: PC.surfaceAlt, border: `1px solid ${PC.border}`, borderRadius: 6, color: PC.text, fontSize: 12, padding: "4px 8px", fontFamily: "Georgia, serif", outline: "none" }}
              />
              <button onClick={addUnscheduled} style={{ background: PC.accent, border: "none", borderRadius: 6, color: "#fff", fontSize: 14, padding: "4px 10px", cursor: "pointer", fontWeight: 700 }}>+</button>
            </div>
          </SideCard>

          {/* Cleaning */}
          <SideCard title={`🧹 ${CLEANING_DATA[activeDay].area}`} dotColor={PC.gold}>
            {day.cleaning.map((task, ti) => (
              <div key={task.id} style={{ display: "flex", alignItems: "flex-start", gap: 8, padding: "5px 0", borderBottom: ti < day.cleaning.length - 1 ? `1px solid ${PC.border}` : "none" }}>
                <PlannerCheckbox checked={task.checked} onToggle={() => toggleCleaning(activeDay, ti)} />
                <span style={{ fontSize: 12, flex: 1, color: task.checked ? PC.textDim : PC.text, textDecoration: task.checked ? "line-through" : "none", lineHeight: 1.4 }}>{task.text}</span>
              </div>
            ))}
          </SideCard>

          {/* Water */}
          <SideCard title="💧 Water" dotColor={PC.blue}>
            <div style={{ fontSize: 10, color: PC.textMid, fontFamily: "monospace", marginBottom: 10 }}>tap each bottle as you finish it</div>
            <div style={{ display: "flex", gap: 8, justifyContent: "space-between" }}>
              {day.water.map((filled, bi) => (
                <div key={bi} onClick={() => toggleWater(activeDay, bi)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4, cursor: "pointer" }}>
                  <span style={{ fontSize: 28, opacity: filled ? 1 : 0.22, transition: "opacity .15s", lineHeight: 1 }}>🫙</span>
                  <span style={{ fontSize: 9, color: PC.textMid, fontFamily: "monospace" }}>{bi + 1}</span>
                </div>
              ))}
            </div>
            <div style={{ fontSize: 10, textAlign: "center", marginTop: 8, fontFamily: "monospace", color: waterCount === 4 ? PC.accent : PC.textMid }}>
              {waterCount === 4 ? "✓ all 4 done!" : `${waterCount} of 4`}
            </div>
          </SideCard>

          {/* Reset */}
          <div style={{ textAlign: "center", paddingTop: 4 }}>
            <button
              onClick={() => { if (window.confirm(`Reset all checks for ${DAYS[activeDay]}? Notes stay.`)) resetDay(activeDay); }}
              style={{ background: "transparent", border: `1px solid ${PC.border}`, color: PC.textDim, borderRadius: 6, padding: "4px 14px", fontSize: 10, cursor: "pointer", fontFamily: "monospace" }}
            >
              reset {SHORT[activeDay]} checks
            </button>
          </div>

        </div>
      </div>
    </div>
  );
}

// ── SlotRow ──────────────────────────────────────────────────────────────────
function SlotRow({ slot, dayIdx, slotIdx, onToggle, onSkip, onDelete, onNote, onTime, onTeeth, onGymNav }) {
  const [noteOpen, setNoteOpen] = useState(false);
  const [editingTime, setEditingTime] = useState(false);
  const [timeVal, setTimeVal] = useState(slot.time || "");
  const isGym = slot.tag === "gym";
  const tagStyle = TAG_COLORS[slot.tag] || null;

  return (
    <div style={{ display: "flex", alignItems: "flex-start", padding: "6px 0", borderBottom: `1px solid rgba(0,0,0,0.05)`, gap: 0, opacity: slot.skipped ? 0.35 : 1 }}>

      {/* Time */}
      <div style={{ width: 70, flexShrink: 0, paddingTop: 3 }}>
        {editingTime ? (
          <input
            autoFocus
            value={timeVal}
            onChange={e => setTimeVal(e.target.value)}
            onBlur={() => { onTime(timeVal.trim()); setEditingTime(false); }}
            onKeyDown={e => { if (e.key === "Enter" || e.key === "Escape") { onTime(timeVal.trim()); setEditingTime(false); } }}
            style={{ width: 62, background: PC.petal, border: `1px solid ${PC.petalDark}`, borderRadius: 4, color: PC.greenDark, fontSize: 10, fontFamily: "monospace", padding: "2px 4px", outline: "none" }}
          />
        ) : (
          <span
            onClick={() => !slot.skipped && setEditingTime(true)}
            style={{ fontSize: 10, fontFamily: "monospace", color: PC.textMid, cursor: slot.skipped ? "default" : "pointer", borderBottom: "1px dashed transparent", display: "inline-block" }}
            onMouseEnter={e => { if (!slot.skipped) e.target.style.borderBottomColor = PC.border; }}
            onMouseLeave={e => { e.target.style.borderBottomColor = "transparent"; }}
          >
            {slot.time || ""}
          </span>
        )}
      </div>

      {/* Body */}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8 }}>
          <div style={{ flex: 1 }}>
            {/* Label row */}
            <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
              <span style={{
                fontSize: 13, color: slot.checked ? PC.textDim : PC.text, lineHeight: 1.4,
                textDecoration: slot.checked ? "line-through" : "none",
              }}>
                {slot.label}
              </span>
              {tagStyle && (
                <span style={{ fontSize: 9, padding: "1px 6px", borderRadius: 10, background: tagStyle.bg, color: tagStyle.color, fontFamily: "monospace", letterSpacing: "0.05em", flexShrink: 0 }}>
                  {slot.tag}
                </span>
              )}
            </div>

            {/* Gym tap-through */}
            {isGym && !slot.skipped && (
              <button onClick={onGymNav} style={{ marginTop: 4, fontSize: 10, background: PC.petal, border: `1px solid ${PC.petalDark}`, borderRadius: 6, padding: "2px 10px", color: PC.greenDark, cursor: "pointer", fontFamily: "monospace", letterSpacing: "0.04em" }}>
                → open gym tracker
              </button>
            )}

            {/* Teeth */}
            {(slot.teeth_am || slot.teeth_pm) && !slot.skipped && (() => {
              const arr = slot.teeth_am || slot.teeth_pm;
              const teethKey = slot.teeth_am ? "teeth_am" : "teeth_pm";
              const labels = slot.teeth_am ? ["Morning brush", "Morning floss"] : ["Night brush", "Night floss"];
              return (
                <div style={{ display: "flex", gap: 10, marginTop: 5 }}>
                  {labels.map((lbl, bi) => (
                    <div key={bi} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                      <PlannerCheckbox size={13} checked={arr[bi]} onToggle={() => onTeeth(teethKey, bi)} />
                      <span style={{ fontSize: 10, color: PC.textMid }}>{lbl}</span>
                    </div>
                  ))}
                </div>
              );
            })()}

            {/* Note */}
            {!slot.skipped && (
              <>
                <button
                  onClick={() => setNoteOpen(o => !o)}
                  style={{ marginTop: 3, fontSize: 9, background: "transparent", border: `1px solid ${PC.border}`, borderRadius: 3, color: slot.note ? PC.accent : PC.textDim, cursor: "pointer", padding: "1px 5px", fontFamily: "monospace" }}
                >
                  {noteOpen ? "▲ note" : (slot.note ? "▼ note •" : "▼ note")}
                </button>
                {noteOpen && (
                  <textarea
                    autoFocus
                    value={slot.note || ""}
                    onChange={e => onNote(e.target.value)}
                    placeholder="add a note…"
                    rows={2}
                    style={{ display: "block", marginTop: 3, width: "100%", background: PC.surfaceAlt, border: `1px solid ${PC.border}`, borderRadius: 5, color: PC.text, fontSize: 11, padding: "4px 6px", resize: "vertical", outline: "none", fontFamily: "Georgia, serif" }}
                  />
                )}
              </>
            )}
          </div>

          {/* Right: checkbox + skip/delete */}
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 5, flexShrink: 0, paddingTop: 2 }}>
            <PlannerCheckbox checked={slot.checked} onToggle={onToggle} disabled={slot.skipped} />
            {slot.added ? (
              <button
                onClick={onDelete}
                title="Remove this item"
                style={{ background: "transparent", border: "none", fontSize: 12, cursor: "pointer", padding: 0, color: PC.textDim, lineHeight: 1 }}
              >
                ✕
              </button>
            ) : (
              <button
                onClick={onSkip}
                title={slot.skipped ? "Restore" : "Skip for today"}
                style={{ background: "transparent", border: "none", fontSize: 12, cursor: "pointer", padding: 0, color: slot.skipped ? PC.orange : PC.textDim, lineHeight: 1 }}
              >
                {slot.skipped ? "↩" : "–"}
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── PlannerCheckbox ──────────────────────────────────────────────────────────
function PlannerCheckbox({ checked, onToggle, disabled, size = 16 }) {
  return (
    <div
      onClick={disabled ? undefined : onToggle}
      style={{
        width: size, height: size, borderRadius: 3, flexShrink: 0,
        border: `1.5px solid ${checked ? PC.accent : PC.border}`,
        background: checked ? PC.accent : "transparent",
        cursor: disabled ? "default" : "pointer",
        display: "flex", alignItems: "center", justifyContent: "center",
        opacity: disabled ? 0.2 : 1, transition: "all .15s",
      }}
    >
      {checked && <span style={{ fontSize: size * 0.6, color: "#fff", fontWeight: 900, lineHeight: 1 }}>✓</span>}
    </div>
  );
}

// ── SideCard ─────────────────────────────────────────────────────────────────
function SideCard({ title, dotColor, children }) {
  return (
    <div style={{ background: PC.surface, border: `1px solid ${PC.border}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>
      <div style={{ fontSize: 11, fontWeight: 700, marginBottom: 9, display: "flex", alignItems: "center", gap: 6, color: PC.text }}>
        <div style={{ width: 8, height: 8, borderRadius: "50%", background: dotColor, flexShrink: 0 }} />
        {title}
      </div>
      {children}
    </div>
  );
}

// ── GymSessionCard ───────────────────────────────────────────────────────────
function GymSessionCard({ activeDay, daySlots, onAdd, onRemove, onGymNav }) {
  const [time, setTime] = useState("");
  const [label, setLabel] = useState("");
  const [adding, setAdding] = useState(false);

  const gymSlots = daySlots.filter(s => s.tag === "gym");

  const fmt = t => {
    if (!t) return "";
    const [h, m] = t.split(":").map(Number);
    const ampm = h >= 12 ? "p" : "a";
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return h12 + ":" + (m < 10 ? "0" + m : m) + ampm;
  };

  function handleAdd() {
    onAdd(fmt(time), label.trim() || "💪 Gym session");
    setTime(""); setLabel(""); setAdding(false);
  }

  return (
    <SideCard title="💪 Gym" dotColor={PC.accent}>
      {gymSlots.length === 0 ? (
        <div style={{ fontSize: 11, color: PC.textMid, fontStyle: "italic", marginBottom: 8 }}>
          No gym session scheduled today
        </div>
      ) : (
        gymSlots.map(slot => (
          <div key={slot.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "5px 0", borderBottom: `1px solid ${PC.border}`, gap: 6 }}>
            <div>
              <div style={{ fontSize: 12, color: PC.text, fontWeight: 600 }}>{slot.label}</div>
              {slot.time && <div style={{ fontSize: 10, color: PC.textMid, fontFamily: "monospace" }}>{slot.time}</div>}
            </div>
            <div style={{ display: "flex", gap: 5, flexShrink: 0 }}>
              <button onClick={onGymNav} style={{ fontSize: 10, background: PC.petal, border: `1px solid ${PC.petalDark}`, borderRadius: 5, padding: "2px 8px", color: PC.greenDark, cursor: "pointer", fontFamily: "monospace" }}>
                → open
              </button>
              <button onClick={() => onRemove(slot.id)} style={{ fontSize: 10, background: "transparent", border: `1px solid ${PC.border}`, borderRadius: 5, padding: "2px 6px", color: PC.textMid, cursor: "pointer", fontFamily: "monospace" }}>
                ✕
              </button>
            </div>
          </div>
        ))
      )}

      {adding ? (
        <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 6 }}>
          <input
            placeholder="Label (e.g. 💪 Solo workout)"
            value={label}
            onChange={e => setLabel(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleAdd()}
            style={{ background: PC.surfaceAlt, border: `1px solid ${PC.border}`, borderRadius: 6, color: PC.text, fontSize: 12, padding: "4px 8px", fontFamily: "Georgia, serif", outline: "none" }}
          />
          <div style={{ display: "flex", gap: 6 }}>
            <input
              type="time"
              value={time}
              onChange={e => setTime(e.target.value)}
              style={{ flex: 1, background: PC.surfaceAlt, border: `1px solid ${PC.border}`, borderRadius: 6, color: PC.text, fontSize: 12, padding: "4px 8px", fontFamily: "monospace", outline: "none" }}
            />
            <button onClick={handleAdd} style={{ background: PC.accent, border: "none", borderRadius: 6, color: "#fff", fontSize: 12, padding: "4px 12px", cursor: "pointer", fontWeight: 700 }}>
              Add
            </button>
            <button onClick={() => setAdding(false)} style={{ background: "transparent", border: `1px solid ${PC.border}`, borderRadius: 6, color: PC.textMid, fontSize: 12, padding: "4px 8px", cursor: "pointer" }}>
              ✕
            </button>
          </div>
        </div>
      ) : (
        <button
          onClick={() => setAdding(true)}
          style={{ marginTop: gymSlots.length > 0 ? 8 : 0, fontSize: 11, background: "transparent", border: `1px dashed ${PC.petalDark}`, borderRadius: 6, color: PC.accent, cursor: "pointer", padding: "4px 10px", fontFamily: "monospace", width: "100%" }}
        >
          + add gym session
        </button>
      )}
    </SideCard>
  );
}

// ── UnscheduledItem ──────────────────────────────────────────────────────────
function UnscheduledItem({ item, onSchedule }) {
  const [timeVal, setTimeVal] = useState("");
  const fmt = t => {
    const [h, m] = t.split(":").map(Number);
    const ampm = h >= 12 ? "p" : "a";
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return h12 + ":" + (m < 10 ? "0" + m : m) + ampm;
  };
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "5px 0", borderBottom: `1px solid ${PC.border}`, gap: 6 }}>
      <span style={{ fontSize: 12, flex: 1, color: PC.text }}>{item.text}</span>
      <input type="time" value={timeVal} onChange={e => setTimeVal(e.target.value)}
        style={{ background: PC.surfaceAlt, border: `1px solid ${PC.border}`, borderRadius: 5, color: PC.text, fontSize: 10, padding: "2px 4px", fontFamily: "monospace", outline: "none", width: 72 }} />
      <button onClick={() => timeVal && onSchedule(fmt(timeVal))}
        style={{ background: PC.orange, border: "none", borderRadius: 5, color: "#fff", fontSize: 10, padding: "2px 8px", cursor: "pointer", fontFamily: "monospace", whiteSpace: "nowrap" }}>
        → add
      </button>
    </div>
  );
}

// ── Auth ─────────────────────────────────────────────────────────────────────
// Change this to whatever password you want
const APP_PASSWORD = "sunflower";
const AUTH_KEY = "mf_auth_v1";

function isAuthenticated() {
  try { return localStorage.getItem(AUTH_KEY) === "true"; } catch { return false; }
}

function LoginScreen({ onLogin }) {
  const [input, setInput] = useState("");
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);

  function attempt() {
    if (input === APP_PASSWORD) {
      try { localStorage.setItem(AUTH_KEY, "true"); } catch {}
      onLogin();
    } else {
      setError(true);
      setShake(true);
      setInput("");
      setTimeout(() => setShake(false), 500);
    }
  }

  return (
    <div style={{
      minHeight: "100vh", background: C.bg,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "Georgia, serif",
    }}>
      <div style={{
        background: C.surface, border: `1.5px solid ${C.border}`,
        borderRadius: 20, padding: "40px 36px", maxWidth: 340, width: "90%",
        textAlign: "center", boxShadow: "0 4px 24px rgba(0,0,0,0.07)",
        animation: shake ? "shake .4s ease" : "none",
      }}>
        <div style={{ fontSize: 36, marginBottom: 12 }}>🌿</div>
        <div style={{ fontSize: 22, fontWeight: 700, fontStyle: "italic", color: C.greenDark, marginBottom: 6 }}>
          Mostly Functional
        </div>
        <div style={{ fontSize: 12, color: C.textMid, fontStyle: "italic", marginBottom: 28 }}>
          private — enter your password to continue
        </div>
        <input
          type="password"
          value={input}
          onChange={e => { setInput(e.target.value); setError(false); }}
          onKeyDown={e => e.key === "Enter" && attempt()}
          placeholder="password"
          autoFocus
          style={{
            width: "100%", padding: "10px 14px", fontSize: 14,
            background: error ? "#fdecea" : C.surfaceAlt,
            border: `1.5px solid ${error ? "#e88" : C.border}`,
            borderRadius: 10, outline: "none", textAlign: "center",
            fontFamily: "Georgia, serif", color: C.text, marginBottom: 10,
            transition: "border-color .2s, background .2s",
          }}
        />
        {error && (
          <div style={{ fontSize: 11, color: "#c0392b", marginBottom: 10, fontStyle: "italic" }}>
            that's not right — try again
          </div>
        )}
        <button onClick={attempt} style={{
          width: "100%", padding: "10px 0", background: C.accent, border: "none",
          borderRadius: 10, color: "#fff", fontSize: 13, fontFamily: "Georgia, serif",
          fontStyle: "italic", fontWeight: 700, cursor: "pointer",
          boxShadow: "0 2px 8px rgba(74,124,89,0.3)",
        }}>
          enter
        </button>
        <div style={{ fontSize: 10, color: C.textMid, marginTop: 16, fontStyle: "italic" }}>
          you won't need to do this again on this device
        </div>
      </div>
      <style>{`
        @keyframes shake {
          0%,100% { transform: translateX(0); }
          20%      { transform: translateX(-8px); }
          40%      { transform: translateX(8px); }
          60%      { transform: translateX(-6px); }
          80%      { transform: translateX(6px); }
        }
      `}</style>
    </div>
  );
}

function App() {
  const [appTab, setAppTab] = useState("planner"); // "planner" | "gym"
  const [authed, setAuthed] = useState(() => isAuthenticated());

  if (!authed) return <LoginScreen onLogin={() => setAuthed(true)} />;

  return (
    <div style={{ fontFamily: "Georgia, 'Times New Roman', serif", background: C.bg, minHeight: "100vh" }}>

      {/* Top app switcher */}
      <div style={{ display: "flex", background: "#fff", borderBottom: `2px solid ${C.border}`, padding: "0 12px", position: "sticky", top: 0, zIndex: 100 }}>
        {[
          { key: "planner", label: "🗓 Daily Planner" },
          { key: "gym",     label: "🌿 Gym Tracker" },
        ].map(tab => (
          <button key={tab.key} onClick={() => setAppTab(tab.key)} style={{
            padding: "10px 16px", background: "transparent", border: "none",
            borderBottom: appTab === tab.key ? `2px solid ${C.accent}` : "2px solid transparent",
            color: appTab === tab.key ? C.greenDark : C.textMid,
            fontFamily: "Georgia, serif", fontStyle: "italic", fontSize: 13,
            fontWeight: appTab === tab.key ? 700 : 400,
            cursor: "pointer", marginBottom: -2, transition: "all .15s",
          }}>
            {tab.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ display: appTab === "planner" ? "block" : "none" }}>
        <PlannerView onGymNav={() => setAppTab("gym")} />
      </div>
      <div style={{ display: appTab === "gym" ? "block" : "none" }}>
        <GymTracker onGymNav={() => setAppTab("gym")} />
      </div>

    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
